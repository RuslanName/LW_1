<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<h1 class="center-text">Список дел</h1>
<form id="addTodoForm" class="center-text form-margin">
    <input type="text" id="todoText" name="text" required class="input-padding">
    <button type="submit" class="button">Добавить дело</button>
</form>
<table id="todoList">
    <thead>
    <tr>
        <th>№</th>
        <th>Текст</th>
    </tr>
    </thead>
    <tbody>
    {{rows}}
    </tbody>
</table>
<div id="editModal" class="modal">
    <div class="modal-content">
        <h1 class="center-text">Редактировать дело</h1>
        <form id="editForm">
            <input
                    type="text"
                    id="editText"
                    name="text"
                    required class="input-full-width">
            <button
                    class="button cancel-button"
                    type="button"
                    id="cancelEdit"
            >
                Отмена
            </button>
            <button class="button" type="submit">
                Сохранить
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/script.js"></script>
</body>
</html>
